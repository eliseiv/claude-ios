# Optional local observability overlay: Prometheus scraping the api /metrics.
# Usage:
#   1) put your scrape token into infra/observability/secrets/scrape_token (gitignored)
#      and set the SAME value as METRICS_SCRAPE_TOKEN in .env
#   2) docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# The token file is mounted read-only; it is NOT baked into any image (05-security.md).

services:
  prometheus:
    # v2.49+ required for per-job http_headers (see prometheus.yml).
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/rules:/etc/prometheus/rules:ro
      # Token file: provide locally, never committed. Mounted read-only.
      - ./infra/observability/secrets/scrape_token:/etc/prometheus/secrets/scrape_token:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      api:
        condition: service_healthy

volumes:
  promdata:
