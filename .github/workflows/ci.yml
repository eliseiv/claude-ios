# CI gate (07-deployment.md §CI/CD, 06-testing-strategy.md §CI gate).
# Platform: GitHub Actions (CI platform not fixed in docs -> reasonable default).
# Any failure on lint / format / type-check / tests / coverage blocks merge.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Avoid wasted runs: cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.4.30"
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: lint • format • types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv sync)
        run: uv sync --frozen

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

  test:
    name: test • coverage gate
    runs-on: ubuntu-latest
    # Integration/e2e use testcontainers, which need a Docker daemon (present on
    # ubuntu-latest runners). No service containers declared: testcontainers manages them.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps (uv sync)
        run: uv sync --frozen

      # Global coverage gate: 80% (02-tech-stack.md, 06-testing-strategy.md).
      - name: Pytest + coverage (global gate 80%)
        run: >
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      # Critical packages must hit >=95% (06-testing-strategy.md §Coverage gate).
      - name: Critical-package coverage gate (policy/wallet/byok >=95%)
        run: >
          uv run pytest
          --cov=src/app/policy
          --cov=src/app/wallet
          --cov=src/app/byok
          --cov-report=term-missing
          --cov-fail-under=95
          tests/unit tests/integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build-image:
    name: build docker image (validation only)
    runs-on: ubuntu-latest
    needs: [quality, test]
    # ADR-017: the deployable image is BUILT ON THE SERVER (`docker compose up -d --build`),
    # NOT pushed to a registry. This job only VALIDATES that the Dockerfile builds — it does
    # not log in to or push to any registry (no `packages: write`, no GHCR). Deploy is a
    # separate workflow (.github/workflows/deploy.yml: SSH -> git pull -> compose up --build).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: claude-ios-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
