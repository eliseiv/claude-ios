# Deploy workflow — shared server + external Traefik via SSH (docs/07-deployment.md
# §Процедура деплоя, ADR-017). Separate from ci.yml (lint/test/build gate): this workflow
# only deploys. The image is BUILT ON THE SERVER (`docker compose up -d --build`), not pulled
# from a registry — there is no immutable registry tag in this scheme (ADR-017).
#
# Flow (per ADR-017): SSH to the server -> cd /opt/claude-ios -> git pull ->
#   docker compose -f docker-compose.prod.yml run --rm migrate  (alembic upgrade head 0001->0004)
#   docker compose -f docker-compose.prod.yml up -d --build      (rebuild + restart api)
#   smoke: curl -fsS https://${SERVICE_DOMAIN}/healthz
#
# GitHub Secrets (Settings -> Secrets and variables -> Actions): NEVER hardcode these.
#   SSH_HOST=87.239.135.154
#   SSH_USER=root
#   SSH_PRIVATE_KEY  (private key whose public half is in the server's ~/.ssh/authorized_keys)
# Optional repo Variable (not a secret): SERVICE_DOMAIN=broadnova.shop (Q-017-1 resolved; used
# for the public smoke check). If unset, the smoke step is skipped (e.g. before the A-record /
# TLS cert exists on the first deploy) — see the `if: ${{ vars.SERVICE_DOMAIN != '' }}` guard
# and the retry loop on the smoke step below, so a not-yet-ready DNS/cert does not fail deploy.
#
# ROLLBACK (no registry/immutable tag): on the server, in /opt/claude-ios:
#   git log --oneline -n 5                         # find the previous good commit
#   git checkout <prev-commit>
#   docker compose -f docker-compose.prod.yml run --rm migrate   # if needed (expand/contract)
#   docker compose -f docker-compose.prod.yml up -d --build
# Schema is NOT reverted (expand/contract migrations keep the old code compatible). See
# docs/07-deployment.md §Откат and infra/deploy/README.md.

name: deploy

on:
  # Deploy on push to main...
  push:
    branches: [main]
  # ...or manually from the Actions tab.
  workflow_dispatch:

# Only one deploy at a time; do NOT cancel an in-flight deploy (avoid half-applied state).
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ssh deploy (shared server + Traefik)
    runs-on: ubuntu-latest
    # Optional GitHub Environment for required reviewers / protection rules on prod deploys.
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Abort on the first failing command; -u catches unset vars.
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/claude-ios
            echo "[deploy] git pull"
            git pull --ff-only
            echo "[deploy] migrate (alembic upgrade head, chain 0001->0004)"
            docker compose -f docker-compose.prod.yml --env-file .env run --rm migrate
            echo "[deploy] build + restart (image built on the server)"
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build
            echo "[deploy] prune dangling build layers (best-effort)"
            docker image prune -f || true

      # Public smoke check through Traefik (TLS + Host routing). SERVICE_DOMAIN is a repo
      # Variable (not a secret), resolved to broadnova.shop. Skipped if unset (e.g. before the
      # domain/A-record exists). NON-FATAL by design: the deploy itself (migrate + build + up)
      # already succeeded above; on the FIRST deploy the A-record may not have propagated or
      # Traefik's Let's Encrypt cert (resolver `le`) may still be issuing, which would make this
      # transiently fail through no fault of the build. We retry (12 x 5s = 60s) and, if still
      # not green, emit a ::warning:: instead of failing the workflow. Re-run the deploy (or just
      # this workflow via workflow_dispatch) once DNS/cert settle to get a green smoke.
      - name: Smoke check /healthz (public, through Traefik)
        if: ${{ vars.SERVICE_DOMAIN != '' }}
        run: |
          set -uo pipefail
          url="https://${{ vars.SERVICE_DOMAIN }}/healthz"
          echo "[smoke] GET $url"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 5 "$url" >/dev/null; then
              echo "[smoke] healthz OK"
              exit 0
            fi
            echo "[smoke] not ready ($i/12) — retrying in 5s"
            sleep 5
          done
          echo "::warning title=Smoke /healthz not green::$url did not return 200 within 60s. The deploy (migrate+build+up) succeeded; DNS/A-record propagation or Traefik's Let's Encrypt cert (resolver 'le') may still be settling on the first deploy. Re-run this workflow once they are ready."
          exit 0
