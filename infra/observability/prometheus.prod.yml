# Prometheus scrape config — PROD (docs/07-deployment.md §Наблюдаемость в проде).
# Identical contract to infra/observability/prometheus.yml but labelled env: prod.
# /metrics is protected by METRICS_SCRAPE_TOKEN: Prometheus injects X-Scrape-Token per-job
# from a mounted file (no secret in this config). Requires Prometheus v2.49+ (http_headers).

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: claude-ios-backend
    metrics_path: /metrics
    scheme: http
    http_headers:
      X-Scrape-Token:
        files:
          - /etc/prometheus/secrets/scrape_token
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: claude-ios-backend
          env: prod
