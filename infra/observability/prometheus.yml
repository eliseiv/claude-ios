# Prometheus scrape config for the backend (01-architecture.md#наблюдаемость).
#
# /metrics is protected by a scrape token (07-deployment.md §Health/readiness,
# 05-security.md): the app compares the `X-Scrape-Token` request header against
# METRICS_SCRAPE_TOKEN. Prometheus injects that header per-job via `http_headers`
# (supported since Prometheus v2.49). The token VALUE is never written here — it is
# read from a file mounted at /etc/prometheus/secrets/scrape_token, provisioned from
# the secret manager (or an .env-driven mount in local dev). No secret in this file.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: claude-ios-backend
    metrics_path: /metrics
    scheme: http
    http_headers:
      X-Scrape-Token:
        # Secret stays out of config: read from a mounted file (05-security.md).
        files:
          - /etc/prometheus/secrets/scrape_token
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: claude-ios-backend
          env: local
